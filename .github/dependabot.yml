version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Delay version-update PRs so a freshly-published malicious release is caught
    # before it lands. Security updates are exempt and still come through fast.
    cooldown:
      default-days: 3
    groups:
      dev-dependencies:
        patterns: ['*']
    ignore:
      # Types track the minimum supported runtime (engines >=20), not the newest.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      actions:
        patterns: ['*']
