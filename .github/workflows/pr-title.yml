name: PR title

# The repo is squash-merge only, so the PR title becomes the public commit
# message. Enforce Conventional Commits on titles; branch commits are free.
on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            refactor
            perf
            build
            ci
            chore
          requireScope: false
