name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual publish of the version currently on main

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Trusted Publishing (OIDC) needs npm >= 11.5.1. Pin to 11.x: Node 20 ships npm 10, and
      # npm 12 requires Node 22+.
      - run: npm install -g npm@11
      - run: npm publish --provenance --access public
