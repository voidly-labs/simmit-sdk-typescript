name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Generated types are tool-owned: regenerate from the committed
      # openapi.json snapshot and fail if the checked-in output drifted.
      - name: Generated types drift check
        run: |
          pnpm generate
          git diff --exit-code src/generated/
      - run: pnpm format:check
      - run: pnpm check-types
      - run: pnpm build
      # Package-shape checks: exports map + dual ESM/CJS types resolution.
      - run: pnpm lint:package
      - run: pnpm test
